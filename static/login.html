<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新生身份验证</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .success {
            background-color: #e8f5e8;
            color: #2e7d32;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn.loading {
            opacity: 0.8;
            cursor: not-allowed;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 30px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>新生身份验证</h1>
        
        <div id="message" class="error"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="student_id">学号</label>
                <input type="text" id="student_id" name="student_id" placeholder="请输入学号" required>
            </div>
            
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" placeholder="请输入姓名" required>
            </div>
            
            <button type="submit" class="btn" id="submit-btn">
                验证身份
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="login-select.html" style="color: #667eea; text-decoration: none; font-size: 14px;">返回选择页面</a>
        </div>
    </div>
    
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const studentId = document.getElementById('student_id').value;
            const name = document.getElementById('name').value;
            const submitBtn = document.getElementById('submit-btn');
            const message = document.getElementById('message');
            
            // 显示加载状态
            submitBtn.innerHTML = '<div class="loading"></div>验证中...';
            submitBtn.disabled = true;
            message.style.display = 'none';
            
            // 调用后端接口验证身份
            fetch(`/api/student/info/?student_id=${studentId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // 验证成功，检查姓名是否匹配
                        if (data.data.name === name) {
                            // 保存学生信息到本地存储
                            localStorage.setItem('studentInfo', JSON.stringify(data.data));
                            localStorage.setItem('studentId', studentId);
                            
                            // 跳转到主页面
                            window.location.href = 'index.html';
                        } else {
                            message.className = 'error';
                            message.textContent = '学号或姓名错误';
                            message.style.display = 'block';
                        }
                    } else {
                        message.className = 'error';
                        message.textContent = '学号或姓名错误';
                        message.style.display = 'block';
                    }
                })
                .catch(error => {
                    message.className = 'error';
                    message.textContent = '网络错误，请稍后重试';
                    message.style.display = 'block';
                    console.error('Error:', error);
                })
                .finally(() => {
                    submitBtn.innerHTML = '验证身份';
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
